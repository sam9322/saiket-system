<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4: Ultimate JavaScript Quiz UI/UX</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Glow Orbs -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <!-- Quiz Main Card Container -->
    <main id="quiz-card" class="quiz-container">
        
        <!-- Quiz Header -->
        <header class="quiz-header">
            <div class="header-top">
                <div class="quiz-badge">
                    <span class="pulse-dot"></span>
                    <span>JavaScript Master Quiz</span>
                </div>
                <div class="score-live-badge">
                    <span>Score: </span>
                    <strong id="live-score">0</strong>
                </div>
            </div>

            <h1 class="quiz-title">Web Development Challenge</h1>
            
            <!-- Progress Tracker Bar -->
            <div class="progress-container">
                <div class="progress-info">
                    <span id="question-tracker">Question 1 of 4</span>
                    <span id="progress-percent">25%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
            </div>
        </header>

        <!-- Active Question Body -->
        <section id="quiz-body" class="quiz-body">
            
            <!-- Interactive Validation Banner -->
            <div id="validation-warning" class="warning-banner hidden" role="alert">
                <span class="warning-icon">&#9888;</span>
                <span>Please select an option before proceeding!</span>
            </div>

            <!-- Question Box -->
            <div class="question-box">
                <span id="category-tag" class="category-tag">HTML & JS</span>
                <h2 id="question-text" class="question-text">Loading question...</h2>
            </div>

            <!-- Options Container -->
            <div id="options-container" class="options-container">
                <!-- Options rendered dynamically -->
            </div>

            <!-- Quiz Controls Footer -->
            <footer class="quiz-footer">
                <button id="next-btn" class="btn btn-primary">
                    <span>Next Question</span>
                    <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </footer>

        </section>

        <!-- Final Results Screen -->
        <section id="score-container" class="score-container hidden">
            <div class="trophy-wrapper">
                <div class="trophy-glow"></div>
                <div class="trophy-icon">&#127942;</div>
            </div>
            
            <h2 class="score-title">Quiz Completed!</h2>
            <p class="score-subtitle">Here is a summary of your performance</p>

            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-label">Accuracy Score</span>
                    <span id="score-percentage" class="stat-value highlight-gradient">0%</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Correct Answers</span>
                    <span id="score-text" class="stat-value">0 / 4</span>
                </div>
            </div>

            <p id="feedback-message" class="feedback-message">Great effort!</p>

            <button id="restart-btn" class="btn btn-restart">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.5 2v6h-6M2.1 12a10 10 0 1 1 3.3 8.4l-2.4 2.4"></path>
                </svg>
                <span>Try Again</span>
            </button>
        </section>

    </main>

    <!-- JavaScript File -->
    <script src="script.js"></script>
</body>
</html>
